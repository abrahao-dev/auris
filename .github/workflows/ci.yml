name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: decoder tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The decoder + model table are pure-Python with no BLE/GUI deps, so the
      # core logic is tested fast on every OS without installing anything.
      - name: Run decoder tests
        run: python tests/test_protocol.py
