name: 💡 Feature request
description: Suggest an idea or improvement (English or Português)
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the feature.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine it working?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other apps that do this, workarounds you use today, etc.
